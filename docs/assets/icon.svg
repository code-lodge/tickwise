<!-- Tickwise mark — matches electron/build/icon-*.png. Teal → cyan
     gradient (Code Lodge palette), dark indigo clock hands, light
     bezel ring. Used as the favicon and as the in-page brand mark. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="tw-face" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- Face -->
  <circle cx="256" cy="256" r="240" fill="url(#tw-face)"/>
  <!-- Bezel ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#cbd5e1" stroke-width="10"/>
  <!-- Minute hand (up) -->
  <rect x="240" y="120" width="32" height="156" rx="14" fill="#0c0f1c"/>
  <!-- Hour hand (right) -->
  <rect x="256" y="244" width="148" height="32" rx="14" fill="#0c0f1c"/>
  <!-- Center cap -->
  <circle cx="256" cy="256" r="20" fill="#0c0f1c"/>
</svg>
